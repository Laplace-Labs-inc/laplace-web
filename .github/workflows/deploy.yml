name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

# Monorepo policy (2026-05-28): the VitePress site under docs/ stays in the
# repo as a placeholder for future migration but is NOT built or deployed.
# All public documentation is served from the Astro site under
# astro/src/pages/docs/. Removing VitePress from CI also resolves the
# /docs/ CSS 404 issue caused by VitePress dist/ overwriting Astro's
# /docs/ output during the merge step.

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: astro/package-lock.json

      - name: Install Astro deps
        run: npm install
        working-directory: ./astro

      - name: Build Astro
        run: npm run build
        working-directory: ./astro

      - name: Stage deploy dir
        run: |
          mkdir -p deploy
          cp -r astro/dist/. deploy/

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: "./deploy"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
